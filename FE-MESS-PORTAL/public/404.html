<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mess Portal</title>
    <!--
      Single Page Apps for GitHub Pages
      https://github.com/rafgraph/spa-github-pages
      GitHub Pages has no server-side routing, so any deep link (e.g.
      /MessPortal/student/dashboard) is served this 404 page. This script
      rewrites the URL into a query string and redirects to index.html, where
      a matching snippet restores the real path before React Router boots.
    -->
    <script type="text/javascript">
      // Number of path segments to keep before the SPA route begins.
      // The app lives under "/MessPortal/", so keep 1 segment.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
