<!doctype html>
<html lang='en'>
  <head>
    <meta charset='UTF-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0' />
    <meta name='theme-color' content='#1f2937' />
    <title>Mess Portal</title>
    <meta
      name='description'
      content='Mess Portal — apply for leave, post feedback, raise complaints, check rebate status, and view the mess menu.'
    />

    <!-- Favicons. %BASE_URL% is rewritten by Vite to respect the configured base
         (/ in dev, /MessPortal/ on GitHub Pages), so these resolve on every route. -->
    <link rel='icon' type='image/png' sizes='32x32' href='%BASE_URL%favicon-32.png' />
    <link rel='icon' type='image/png' sizes='192x192' href='%BASE_URL%favicon-192.png' />
    <link rel='apple-touch-icon' sizes='180x180' href='%BASE_URL%apple-touch-icon.png' />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, etc.). og:image must be an
         absolute URL because external scrapers can't resolve relative paths. -->
    <meta property='og:type' content='website' />
    <meta property='og:site_name' content='Mess Portal' />
    <meta property='og:title' content='Mess Portal' />
    <meta
      property='og:description'
      content='Apply for leave, post feedback, raise complaints, check rebate status, and view the mess menu.'
    />
    <meta property='og:url' content='https://yogeshlodhi.github.io/MessPortal/' />
    <meta property='og:image' content='https://yogeshlodhi.github.io/MessPortal/og-image.jpg' />
    <meta property='og:image:width' content='1200' />
    <meta property='og:image:height' content='630' />

    <!-- Twitter / X card -->
    <meta name='twitter:card' content='summary_large_image' />
    <meta name='twitter:title' content='Mess Portal' />
    <meta
      name='twitter:description'
      content='Apply for leave, post feedback, raise complaints, check rebate status, and view the mess menu.'
    />
    <meta name='twitter:image' content='https://yogeshlodhi.github.io/MessPortal/og-image.jpg' />
    <!--
      Single Page Apps for GitHub Pages — restore the real URL that 404.html
      encoded into the query string, before React Router reads location.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script type='text/javascript'>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id='root'></div>
    <script type='module' src='/src/main.tsx'></script>
  </body>
</html>
